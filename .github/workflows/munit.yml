name: MUnit CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:        # manual "Run workflow" button in the Actions tab

jobs:
  test:
    name: Run MUnit + enforce coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run MUnit tests with coverage
        env:
          ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
        run: >
          mvn clean test
          --settings .github/settings.xml
          --batch-mode
          --no-transfer-progress

      - name: Show where the coverage report landed
        if: always()
        run: |
          echo "Listing target/site (coverage report location may vary by plugin version):"
          find target -type d -name 'coverage' -print 2>/dev/null || true
          ls -R target/site 2>/dev/null || echo "No target/site directory was produced."

      - name: Publish coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: munit-coverage-report
          path: |
            target/site/munit/
            target/munit/coverage/
          if-no-files-found: warn
